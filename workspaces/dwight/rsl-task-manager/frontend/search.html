<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - Search</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon-180x180.png">
    <link rel="apple-touch-icon" sizes="167x167" href="/static/apple-touch-icon-167x167.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/static/apple-touch-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="120x120" href="/static/apple-touch-icon-120x120.png">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/LatestAppIcon.png">
    <meta name="apple-mobile-web-app-title" content="Task Manager">
    <meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <div class="nav-left">
                <h2>Task Manager</h2>
                <a href="/static/backlog.html" class="nav-link">Backlog</a>
                <a href="/static/sprint.html" class="nav-link" data-sprint-nav-link>Sprint</a>
                <a href="/static/search.html" class="nav-link active">Search</a>
            </div>
            <div class="nav-right">
                <span id="currentUser" class="username"></span>
                <button id="createIssueBtn" class="btn btn-primary">+ Create Issue</button>
                <button id="logoutBtn" class="btn btn-secondary">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Search Issues</h1>
        </div>

        <div class="filters-panel">
            <div class="filters-header">
                <h3>Operator Views</h3>
                <button id="clearOperatorViewBtn" class="btn btn-secondary btn-sm">Show All</button>
            </div>
            <div class="filters-grid">
                <div class="filter-group">
                    <button type="button" class="btn btn-secondary btn-sm operator-view-btn" data-operator-view="ready_not_queued">Ready, Not Queued</button>
                </div>
                <div class="filter-group">
                    <button type="button" class="btn btn-secondary btn-sm operator-view-btn" data-operator-view="active_launch_without_recent_evidence">Queued/Launched, No Recent Evidence</button>
                </div>
                <div class="filter-group">
                    <button type="button" class="btn btn-secondary btn-sm operator-view-btn" data-operator-view="in_progress_no_pr">In Progress, No PR</button>
                </div>
            </div>
            <small id="operatorViewSummary" class="muted-text">No operator view selected.</small>
        </div>

        <!-- Search Bar -->
        <div class="search-bar-container">
            <input type="text" id="searchInput" class="search-input" placeholder="Search issues or enter exact issue # (e.g. 4 or #4)" autocomplete="off">
            <button id="searchBtn" class="btn btn-primary">Search</button>
        </div>

        <!-- Filters -->
        <div class="filters-panel">
            <div class="filters-header">
                <h3>Filters</h3>
                <button id="clearFiltersBtn" class="btn btn-secondary btn-sm">Clear All</button>
            </div>
            <div class="filters-grid">
                <div class="filter-group">
                    <label for="filterSearchIn">Search in</label>
                    <select id="filterSearchIn" class="select">
                        <option value="all">All (title + description + comments)</option>
                        <option value="title">Title only</option>
                        <option value="description">Description only</option>
                        <option value="comments">Comments only</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="filterStatus">Status</label>
                    <select id="filterStatus" class="select">
                        <option value="">Any</option>
                        <option value="to_do">To Do</option>
                        <option value="in_progress">In Progress</option>
                        <option value="in_review">In Review</option>
                        <option value="blocked">Blocked</option>
                        <option value="done">Done</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="filterSprint">Sprint</label>
                    <select id="filterSprint" class="select">
                        <option value="">Any</option>
                        <option value="backlog">Backlog (unassigned)</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="filterUser">Created by</label>
                    <select id="filterUser" class="select">
                        <option value="">Anyone</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="filterAssignedTo">Assigned to</label>
                    <select id="filterAssignedTo" class="select">
                        <option value="">Anyone</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="filterMinPoints">Min points</label>
                    <input type="number" id="filterMinPoints" class="select" min="1">
                </div>
                <div class="filter-group">
                    <label for="filterMaxPoints">Max points</label>
                    <input type="number" id="filterMaxPoints" class="select" min="1">
                </div>
                <div class="filter-group">
                    <label for="filterStaleDays">Stale at least (days)</label>
                    <input type="number" id="filterStaleDays" class="select" min="1" placeholder="e.g. 3">
                </div>
                <div class="filter-group checkbox-filter-group">
                    <label><input type="checkbox" id="filterBlockedOnly"> Blocked only</label>
                </div>
                <div class="filter-group checkbox-filter-group">
                    <label><input type="checkbox" id="filterNeedsReview"> Needs review only</label>
                </div>
                <div class="filter-group">
                    <label for="filterDateFrom">From date</label>
                    <input type="date" id="filterDateFrom" class="select">
                </div>
                <div class="filter-group">
                    <label for="filterDateTo">To date</label>
                    <input type="date" id="filterDateTo" class="select">
                </div>
            </div>
        </div>

        <!-- Results -->
        <div class="search-results-header">
            <span id="resultCount"></span>
        </div>
        <div id="searchResults" class="issues-list"></div>
    </div>

    <!-- Create Issue Modal -->
    <div id="createIssueModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create Issue</h2>
                <span class="close">&times;</span>
            </div>
            <form id="createIssueForm">
                <div class="form-group">
                    <label for="issueTitle">Title *</label>
                    <input type="text" id="issueTitle" name="title" required>
                </div>
                <div class="form-group">
                    <label for="issueDescription">Description *</label>
                    <textarea id="issueDescription" name="description" rows="5" required></textarea>
                </div>
                <div class="form-group">
                    <label for="issueAcceptanceCriteria">Acceptance Criteria</label>
                    <textarea id="issueAcceptanceCriteria" name="acceptance_criteria" rows="4"></textarea>
                </div>
                <div class="form-row form-row-3">
                    <div class="form-group">
                        <label for="issueAssignedTo">Assign to</label>
                        <select id="issueAssignedTo" name="assigned_to">
                            <option value="">Unassigned</option>
                            <option value="Dwight">Dwight</option>
                            <option value="Jerry">Jerry</option>
                            <option value="Resi">Resi</option>
                            <option value="Druck">Druck</option>
                            <option value="Aaron">Aaron</option>
                            <option value="Taylor">Taylor</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="issueStoryPoints">Story Points</label>
                        <input type="number" id="issueStoryPoints" name="story_points" min="1" max="21">
                    </div>
                </div>
                <div class="form-group">
                    <label for="issueBlockedReason">Blocked Reason</label>
                    <input type="text" id="issueBlockedReason" name="blocked_reason" placeholder="Optional blocker or dependency">
                </div>
                <div class="form-group">
                    <label for="issueBranch">Branch</label>
                    <input type="text" id="issueBranch" name="branch" placeholder="e.g. issue-129-tm-exec-readiness-contract">
                </div>
                <div class="form-group">
                    <label for="issueRepoSlug">Repo slug (optional)</label>
                    <input type="text" id="issueRepoSlug" name="repo_slug" placeholder="e.g. aarwitz/Task-Manager">
                </div>
                <div class="form-group checkbox-row">
                    <label class="checkbox-label" for="issueAutoLaunchEnabled">
                        <input type="checkbox" id="issueAutoLaunchEnabled" name="auto_launch_enabled">
                        Auto-launch when this issue becomes ready
                    </label>
                    <small class="muted-text">Requires: assigned agent, branch, repo slug, acceptance criteria, and In Progress status.</small>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary cancel-btn">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create Issue</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/tm_shared.js"></script>
    <script src="/static/js/tm_issue_form.js"></script>
    <script src="/static/js/search.js"></script>
</body>
</html>
