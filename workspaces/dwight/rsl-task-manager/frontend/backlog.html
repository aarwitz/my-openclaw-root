<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - Backlog</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon-180x180.png">
    <link rel="apple-touch-icon" sizes="167x167" href="/static/apple-touch-icon-167x167.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/static/apple-touch-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="120x120" href="/static/apple-touch-icon-120x120.png">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/LatestAppIcon.png">
    <meta name="apple-mobile-web-app-title" content="Task Manager">
    <meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <div class="nav-left">
                <h2>Task Manager</h2>
                <a href="/static/backlog.html" class="nav-link active">Backlog</a>
                <a href="/static/sprint.html" class="nav-link" data-sprint-nav-link>Sprint</a>
                <a href="/static/search.html" class="nav-link">Search</a>
            </div>
            <div class="nav-right">
                <span id="currentUser" class="username"></span>
                <button id="createIssueBtn" class="btn btn-primary">+ Create Issue</button>
                <button id="logoutBtn" class="btn btn-secondary">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Backlog</h1>
            <div class="controls">
                <select id="sortBy" class="select">
                    <option value="date">Sort by Date</option>
                    <option value="status">Sort by Status</option>
                </select>
            </div>
        </div>

        <div class="sprint-section">
            <div class="sprint-header">
                <h3>Available Sprints</h3>
                <div class="controls">
                    <button id="toggleArchivedSprintsBtn" class="btn btn-secondary">View Archived Sprints</button>
                    <button id="createSprintBtn" class="btn btn-secondary">+ Create Sprint</button>
                </div>
            </div>
            <div id="sprintsList" class="sprints-list"></div>
        </div>

        <div id="archivedSprintsSection" class="sprint-section" style="display: none;">
            <div class="sprint-header">
                <h3>Archived Sprints</h3>
            </div>
            <div id="archivedSprintsList" class="sprints-list"></div>
        </div>

        <div id="issuesList" class="issues-list"></div>
    </div>

    <!-- Create Issue Modal -->
    <div id="createIssueModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create Issue</h2>
                <span class="close">&times;</span>
            </div>
            <form id="createIssueForm">
                <div class="form-group">
                    <label for="issueTitle">Title *</label>
                    <input type="text" id="issueTitle" name="title" required>
                </div>
                <div class="form-group">
                    <label for="issueDescription">Description *</label>
                    <textarea id="issueDescription" name="description" rows="5" required></textarea>
                </div>
                <div class="form-group">
                    <label for="issueAcceptanceCriteria">Acceptance Criteria</label>
                    <textarea id="issueAcceptanceCriteria" name="acceptance_criteria" rows="4" placeholder="What has to be true for this story to be done?"></textarea>
                </div>
                <div class="form-row form-row-3">
                    <div class="form-group">
                        <label for="issueAssignedTo">Assign to</label>
                        <select id="issueAssignedTo" name="assigned_to">
                            <option value="">Unassigned</option>
                            <option value="Dwight">Dwight</option>
                            <option value="Jerry">Jerry</option>
                            <option value="Resi">Resi</option>
                            <option value="Druck">Druck</option>
                            <option value="Aaron">Aaron</option>
                            <option value="Taylor">Taylor</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="issueStoryPoints">Story Points</label>
                        <input type="number" id="issueStoryPoints" name="story_points" min="1" max="21" placeholder="e.g. 3">
                    </div>
                </div>
                <div class="form-group">
                    <label for="issueBlockedReason">Blocked Reason</label>
                    <input type="text" id="issueBlockedReason" name="blocked_reason" placeholder="Optional blocker or dependency">
                </div>
                <div class="form-group">
                    <label for="issueImages">Attach images (optional)</label>
                    <input type="file" id="issueImages" accept="image/*" multiple>
                    <small id="issueImagesLabel" class="file-name">No files selected</small>
                </div>
                <div class="form-group">
                    <label for="issueSprintId">Assign to sprint</label>
                    <select id="issueSprintId" name="sprint_id">
                        <option value="">Auto (Active Sprint)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="issueBranch">Branch</label>
                    <input type="text" id="issueBranch" name="branch" placeholder="e.g. feature/intake-form">
                </div>
                <div class="form-group">
                    <label for="issueRepoSlug">Repo slug (optional)</label>
                    <input type="text" id="issueRepoSlug" name="repo_slug" placeholder="e.g. aarwitz/lidi-solutions">
                </div>
                <div class="form-group checkbox-row">
                    <label class="checkbox-label" for="issueAutoLaunchEnabled">
                        <input type="checkbox" id="issueAutoLaunchEnabled" name="auto_launch_enabled">
                        Auto-launch when this issue becomes ready
                    </label>
                    <small class="muted-text">Requires: assigned agent, branch, repo slug, acceptance criteria, and In Progress status.</small>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary cancel-btn">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create Issue</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Create Sprint Modal -->
    <div id="createSprintModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create Sprint</h2>
                <span class="close">&times;</span>
            </div>
            <form id="createSprintForm">
                <div class="form-group">
                    <label for="sprintName">Sprint Name *</label>
                    <input type="text" id="sprintName" placeholder="e.g., Sprint 1" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary cancel-sprint-btn">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create Sprint</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/tm_shared.js"></script>
    <script src="/static/js/tm_issue_form.js"></script>
    <script src="/static/js/backlog.js"></script>
</body>
</html>
