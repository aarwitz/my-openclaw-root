services:
  taskmanager:
    build:
      context: .
      dockerfile: Dockerfile.tm
    image: dwight-taskmanager:local
    container_name: dwight-taskmanager
    restart: unless-stopped
    user: "1000:1000"
    working_dir: /workspace/backend
    command: >
      python -m uvicorn main:app --host 0.0.0.0 --port 8000
    environment:
      PYTHONUNBUFFERED: "1"
      TASKMANAGER_DB_PATH: "/workspace/taskmanager.db"
      EWAG_AGENT_USERS: "Overseer,Researcher,Quant,Critic,Trader,Executor,Archivist,Developer"
    volumes:
      - ./:/workspace:rw
      - /home/aaron/.openclaw/workspaces/dwight/taskmanager.db:/workspace/taskmanager.db:rw
    ports:
      - "${TM_PUBLISH_HOST:-0.0.0.0}:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=5).read()"]
      interval: 20s
      timeout: 5s
      retries: 5
