<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>
  <meta http-equiv="refresh" content="0; url=/backlog" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7fb;
      color: #111827;
    }
    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      max-width: 480px;
      text-align: center;
    }
    a {
      color: #1f4ed8;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
  <script>
    window.location.replace('/backlog');
  </script>
</head>
<body>
  <div class="card">
    <h1>Opening Task Manager</h1>
    <p>If you are not redirected automatically, continue to <a href="/backlog">Backlog</a>.</p>
  </div>
</body>
</html>
