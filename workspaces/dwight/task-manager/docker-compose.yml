services:
  taskmanager:
    build:
      context: .
      dockerfile: Dockerfile.tm
    image: lidi-task-manager-local:local
    container_name: lidi-task-manager-local
    restart: unless-stopped
    user: "1000:1000"
    working_dir: /workspace/backend
    command: >
      python -m uvicorn main:app --host 0.0.0.0 --port ${TM_PORT:-8787}
    environment:
      PYTHONUNBUFFERED: "1"
      TASKMANAGER_DB_PATH: "/workspace/taskmanager.db"
      AGENT_USERS: "Overseer,Researcher,Quant,Critic,Trader,Executor,Archivist,Developer"
    volumes:
      - ./:/workspace:rw
      - /home/aaron/.openclaw/workspaces/dwight/taskmanager.db:/workspace/taskmanager.db:rw
    ports:
      - "${TM_PUBLISH_HOST:-0.0.0.0}:${TM_PORT:-8787}:${TM_PORT:-8787}"
    healthcheck:
      test: ["CMD", "python", "-c", "import os, urllib.request; p=os.environ.get('TM_PORT','8787'); urllib.request.urlopen(f'http://127.0.0.1:{p}/', timeout=5).read()"]
      interval: 20s
      timeout: 5s
      retries: 5
